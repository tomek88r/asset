        .logo {
            display: flex;
            align-items: center;

            padding: 4px;
            border-radius: 30px;
            color: white;
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .logo svg {

            height: 18px;

        }

        .search-box {

            right: 0;

            background: rgba(0,0,0,0.5);

            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 16px 14px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

            padding: 8px 12px;

            font-size: 0.85rem;

        .photo-row {

        }

        .photo-row button {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;

            cursor: pointer;

        }

        .thumb-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 8px;
            border: 1px solid #e2e8f0;
        }

        .thumb-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
        }

        .thumb-item img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 6px;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 25px;
            font-size: 0.8rem;

            -webkit-appearance: none;

        .loading-spinner {
            display: inline-block;
            width: 28px;
            height: 28px;

            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<script>
(function() {
    "use strict";
    
    console.log('Aplikacja startuje...');
    
    var STORAGE_KEY = 'asset_app';
    var devices = [];
    var currentFilter = '';
    var currentSort = 'asc';
    var searchTerm = '';
    var editingId = null;
    var unsubscribe = null;
    var lastUpdateTimestamp = 0; // do śledzenia czy były zmiany

    var container = document.getElementById('inventoryContainer');
    var template = document.getElementById('cardTemplate');
    var fab = document.getElementById('fabBtn');
    var modal = document.getElementById('modal');
    var modalTitle = document.getElementById('modalTitle');
    var cancelBtn = document.getElementById('cancelBtn');
    var saveBtn = document.getElementById('saveBtn');
    var lastUpdateEl = document.getElementById('lastUpdate');

    var assetInput = document.getElementById('assetInput');
    var nameInput = document.getElementById('nameInput');
    var snInput = document.getElementById('snInput');
    var locInput = document.getElementById('locInput');
    var dateInput = document.getElementById('dateInput');
    var picInput = document.getElementById('picInput');
    var notesInput = document.getElementById('notesInput');

    var previewCameraBtn = document.getElementById('previewCameraBtn');
    var previewFileBtn = document.getElementById('previewFileBtn');
    var previewCamera = document.getElementById('previewCamera');
    var previewFile = document.getElementById('previewFile');
    var previewThumb = document.getElementById('previewThumb');
    var previewImg = document.getElementById('previewImg');

    var stickerCameraBtn = document.getElementById('stickerCameraBtn');
    var stickerFileBtn = document.getElementById('stickerFileBtn');
    var stickerCamera = document.getElementById('stickerCamera');
    var stickerFile = document.getElementById('stickerFile');
    var stickerThumb = document.getElementById('stickerThumb');
    var stickerImg = document.getElementById('stickerImg');

    var locationFilter = document.getElementById('locationFilter');
    var sortAsc = document.getElementById('sortAsc');
    var sortDesc = document.getElementById('sortDesc');
    var searchInput = document.getElementById('searchInput');
    var exportBtn = document.getElementById('exportBtn');
    var importBtn = document.getElementById('importBtn');
    var importFile = document.getElementById('importFile');

    var previewBase64 = '';
    var stickerBase64 = '';

    var configDiv = document.getElementById('firebase-config');
    var firebaseConfig = {
        apiKey: configDiv ? configDiv.dataset.apiKey : "AIzaSyExample",
        authDomain: configDiv ? configDiv.dataset.authDomain : "your-project.firebaseapp.com",
        projectId: configDiv ? configDiv.dataset.projectId : "your-project",
        storageBucket: configDiv ? configDiv.dataset.storageBucket : "your-project.appspot.com",
        messagingSenderId: configDiv ? configDiv.dataset.messagingSenderId : "123456789",
        appId: configDiv ? configDiv.dataset.appId : "1:123456789:web:abc123"
    };

    var db;
    var firebaseReady = false;

    if (firebaseConfig.apiKey !== "AIzaSyExample" && firebaseConfig.projectId !== "your-project") {
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            firebaseReady = true;
            console.log('Firebase gotowy');
        } catch (e) {
            console.error('Błąd Firebase:', e);
        }
    } else {
        console.log('Brak danych Firebase, używam localStorage');
    }

    function updateLastUpdateTime() {
        var now = new Date();
        var formatted = now.toLocaleString('pl-PL', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        lastUpdateEl.textContent = 'ostatnia aktualizacja: ' + formatted;
        lastUpdateTimestamp = now.getTime();
    }

    function compressImage(file, quality, callback) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, img.width, img.height);
                
                var compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                callback(compressedDataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function loadFromStorage() {
        try {
            var data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch (e) {
            return [];
        }
    }

    function saveToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(devices));
            console.log('Zapisano w localStorage');
            updateLastUpdateTime();
        } catch (e) {
            alert('Za dużo danych! Usuń któreś wpisy.');
        }
    }

    function startFirebaseListener() {
        if (!firebaseReady) return;
        
        unsubscribe = db.collection('devices').onSnapshot(function(snapshot) {
            var loaded = [];
            snapshot.forEach(function(doc) {
                loaded.push({
                    id: doc.id,
                    asset: doc.data().asset,
                    name: doc.data().name,
                    sn: doc.data().sn,
                    loc: doc.data().loc,
                    capDate: doc.data().capDate,
                    picName: doc.data().picName,
                    notes: doc.data().notes,
                    previewImg: doc.data().previewImg || '',
                    stickerImg: doc.data().stickerImg || '',
                    inStock: doc.data().inStock || false
                });
            });
            
            // Sprawdź czy dane się zmieniły
            var changed = false;
            if (devices.length !== loaded.length) {
                changed = true;
            } else {
                for (var i = 0; i < devices.length; i++) {
                    if (JSON.stringify(devices[i]) !== JSON.stringify(loaded[i])) {
                        changed = true;
                        break;
                    }
                }
            }
            
            devices = loaded;
            updateFilterOptions();
            render();
            
            // Aktualizuj datę tylko jeśli były zmiany
            if (changed) {
                updateLastUpdateTime();
            }
        }, function(error) {
            console.error('Błąd listenera Firebase:', error);
        });
    }

    function loadFromFirebase() {
        return db.collection('devices').get()
            .then(function(snapshot) {
                var loaded = [];
                snapshot.forEach(function(doc) {
                    loaded.push({
                        id: doc.id,
                        asset: doc.data().asset,
                        name: doc.data().name,
                        sn: doc.data().sn,
                        loc: doc.data().loc,
                        capDate: doc.data().capDate,
                        picName: doc.data().picName,
                        notes: doc.data().notes,
                        previewImg: doc.data().previewImg || '',
                        stickerImg: doc.data().stickerImg || '',
                        inStock: doc.data().inStock || false
                    });
                });
                return loaded;
            })
            .catch(function(error) {
                console.error('Błąd ładowania z Firebase:', error);
                return loadFromStorage();
            });
    }

    function saveToFirebase() {
        var promises = [];
        devices.forEach(function(device) {
            var docRef = db.collection('devices').doc(device.id);
            promises.push(docRef.set(device));
        });
        return Promise.all(promises);
    }

    function deleteFromFirebase(deviceId) {
        return db.collection('devices').doc(deviceId).delete();
    }

    function saveData() {
        if (firebaseReady) {
            return saveToFirebase();
        } else {
            saveToStorage();
            return Promise.resolve();
        }
    }

    function matchesSearch(device, term) {
        if (!term) return true;
        var t = term.toLowerCase();
        return [device.asset, device.name, device.sn, device.loc, device.picName, device.notes]
            .some(function(f) { return f && f.toLowerCase().includes(t); });
    }

    function getFiltered() {
        var filtered = devices.slice();
        if (searchTerm) {
            filtered = filtered.filter(function(d) { return matchesSearch(d, searchTerm); });
        }
        if (currentFilter) {
            filtered = filtered.filter(function(d) { return d.loc === currentFilter; });
        }
        filtered.sort(function(a, b) {
            var a1 = a.asset.toLowerCase();
            var b1 = b.asset.toLowerCase();
            return currentSort === 'asc' ? a1.localeCompare(b1) : b1.localeCompare(a1);
        });
        return filtered;
    }

    function render() {
        var filtered = getFiltered();
        
        var groups = {};
        filtered.forEach(function(d) {
            var loc = d.loc || 'inne';
            if (!groups[loc]) groups[loc] = [];
            groups[loc].push(d);
        });

        container.innerHTML = '';

        if (Object.keys(groups).length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;font-size:0.8rem;">brak sprzętu</div>';
            return;
        }

        Object.keys(groups).sort().forEach(function(loc) {
            var group = document.createElement('div');
            group.className = 'location-group';

            var header = document.createElement('div');
            header.className = 'location-header';
            header.innerHTML = '<div class="location-icon">📍</div><div class="location-name">' + loc + '</div><div class="location-count">' + groups[loc].length + '</div>';

            var grid = document.createElement('div');
            grid.className = 'cards-grid';

            groups[loc].forEach(function(device) {
                grid.appendChild(createCard(device));
            });

            group.appendChild(header);
            group.appendChild(grid);
            container.appendChild(group);
        });
    }

    function createCard(device) {
        var clone = template.content.cloneNode(true);
        var card = clone.querySelector('.card');
        card.dataset.id = device.id;

        var img = card.querySelector('.card-img');
        if (device.previewImg) {
            img.src = device.previewImg;
        }

        card.querySelector('.asset').textContent = device.asset;
        card.querySelector('.name').textContent = device.name;
        card.querySelector('.sn').textContent = device.sn;
        card.querySelector('.location').textContent = device.loc;

        var stock = card.querySelector('.stock-checkbox');
        stock.checked = device.inStock;
        stock.addEventListener('change', function() {
            device.inStock = stock.checked;
            saveData();
            updateLastUpdateTime();
        });

        var details = card.querySelector('.details');
        var dateField = card.querySelector('.detail-date');
        var picField = card.querySelector('.detail-pic');
        var notesField = card.querySelector('.detail-notes');
        var previewField = card.querySelector('.detail-preview');
        var stickerField = card.querySelector('.detail-sticker');

        dateField.value = device.capDate || '';
        picField.value = device.picName || '';
        notesField.value = device.notes || '';
        
        if (device.previewImg) {
            previewField.src = device.previewImg;
        }
        if (device.stickerImg) {
            stickerField.src = device.stickerImg;
        }

        dateField.addEventListener('input', function() { 
            device.capDate = dateField.value; 
            saveData();
            updateLastUpdateTime();
        });
        
        picField.addEventListener('input', function() { 
            device.picName = picField.value; 
            saveData();
            updateLastUpdateTime();
        });
        
        notesField.addEventListener('input', function() { 
            device.notes = notesField.value; 
            saveData();
            updateLastUpdateTime();
        });

        card.addEventListener('click', function(e) {
            if (e.target.type === 'checkbox' || e.target.classList.contains('edit-btn') || e.target.classList.contains('delete-btn')) return;
            
            document.querySelectorAll('.card.expanded').forEach(function(c) {
                if (c !== card) c.classList.remove('expanded');
            });
            
            card.classList.toggle('expanded');
        });

        card.querySelector('.edit-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            editingId = device.id;
            modalTitle.textContent = 'edytuj sprzęt';
            
            assetInput.value = device.asset;
            nameInput.value = device.name === '—' ? '' : device.name;
            snInput.value = device.sn === '—' ? '' : device.sn;
            locInput.value = device.loc === '—' ? '' : device.loc;
            dateInput.value = device.capDate || '';
            picInput.value = device.picName || '';
            notesInput.value = device.notes || '';

            previewBase64 = device.previewImg || '';
            if (previewBase64) {
                previewThumb.classList.remove('hidden');
                previewImg.src = previewBase64;
            } else {
                previewThumb.classList.add('hidden');
            }

            stickerBase64 = device.stickerImg || '';
            if (stickerBase64) {
                stickerThumb.classList.remove('hidden');
                stickerImg.src = stickerBase64;
            } else {
                stickerThumb.classList.add('hidden');
            }

            modal.classList.add('active');
        });

        card.querySelector('.delete-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm('usunąć?')) {
                var deviceId = device.id;
                devices = devices.filter(function(d) { return d.id !== deviceId; });
                
                if (firebaseReady) {
                    deleteFromFirebase(deviceId).then(function() {
                        updateFilterOptions();
                        render();
                        updateLastUpdateTime();
                    });
                } else {
                    saveToStorage();
                    updateFilterOptions();
                    render();
                }
            }
        });

        return card;
    }

    function updateFilterOptions() {
        var locs = [];
        devices.forEach(function(d) {
            if (d.loc && d.loc !== '—' && locs.indexOf(d.loc) === -1) {
                locs.push(d.loc);
            }
        });
        locs.sort();
        var curr = locationFilter.value;
        locationFilter.innerHTML = '<option value="">wszystkie</option>';
        locs.forEach(function(l) {
            var opt = document.createElement('option');
            opt.value = l;
            opt.textContent = l;
            locationFilter.appendChild(opt);
        });
        if (curr && locs.indexOf(curr) !== -1) locationFilter.value = curr;
    }

    function resetForm() {
        assetInput.value = '';
        nameInput.value = '';
        snInput.value = '';
        locInput.value = '';
        dateInput.value = '';
        picInput.value = '';
        notesInput.value = '';
        
        previewBase64 = '';
        stickerBase64 = '';
        previewThumb.classList.add('hidden');
        stickerThumb.classList.add('hidden');
        
        previewCamera.value = '';
        previewFile.value = '';
        stickerCamera.value = '';
        stickerFile.value = '';
    }

    function handleImageUpload(input, cb) {
        if (!input.files || !input.files[0]) return;
        var file = input.files[0];
        
        if (file.size > 10 * 1024 * 1024) {
            alert('Zdjęcie jest za duże! Maksymalny rozmiar to 10MB.');
            return;
        }
        
        compressImage(file, 0.6, function(compressed) {
            cb(compressed);
        });
    }

    previewCameraBtn.addEventListener('click', function(e) { 
        e.preventDefault();
        previewCamera.click(); 
    });
    
    previewCamera.addEventListener('change', function() {
        handleImageUpload(previewCamera, function(b64) {
            previewBase64 = b64;
            previewThumb.classList.remove('hidden');
            previewImg.src = b64;
        });
    });

    previewFileBtn.addEventListener('click', function(e) { 
        e.preventDefault();
        previewFile.click(); 
    });
    
    previewFile.addEventListener('change', function() {
        handleImageUpload(previewFile, function(b64) {
            previewBase64 = b64;
            previewThumb.classList.remove('hidden');
            previewImg.src = b64;
        });
    });

    stickerCameraBtn.addEventListener('click', function(e) { 
        e.preventDefault();
        stickerCamera.click(); 
    });
    
    stickerCamera.addEventListener('change', function() {
        handleImageUpload(stickerCamera, function(b64) {
            stickerBase64 = b64;
            stickerThumb.classList.remove('hidden');
            stickerImg.src = b64;
        });
    });

    stickerFileBtn.addEventListener('click', function(e) { 
        e.preventDefault();
        stickerFile.click(); 
    });
    
    stickerFile.addEventListener('change', function() {
        handleImageUpload(stickerFile, function(b64) {
            stickerBase64 = b64;
            stickerThumb.classList.remove('hidden');
            stickerImg.src = b64;
        });
    });

    fab.addEventListener('click', function() {
        editingId = null;
        modalTitle.textContent = 'nowy sprzęt';
        resetForm();
        modal.classList.add('active');
    });

    cancelBtn.addEventListener('click', function() {
        modal.classList.remove('active');
        resetForm();
    });

    saveBtn.addEventListener('click', function() {
        var asset = assetInput.value.trim();
        if (!asset) {
            alert('nr asset wymagany');
            return;
        }

        var newDevice = {
            id: editingId || (Date.now() + '-' + Math.random().toString(36).substr(2, 6)),
            asset: asset,
            name: nameInput.value.trim() || '—',
            sn: snInput.value.trim() || '—',
            loc: locInput.value.trim() || '—',
            capDate: dateInput.value || '',
            picName: picInput.value.trim() || '',
            notes: notesInput.value.trim() || '',
            previewImg: previewBase64 || '',
            stickerImg: stickerBase64 || '',
            inStock: false
        };

        if (editingId) {
            var idx = -1;
            for (var i = 0; i < devices.length; i++) {
                if (devices[i].id === editingId) {
                    idx = i;
                    break;
                }
            }
            if (idx !== -1) {
                devices[idx] = newDevice;
            }
        } else {
            devices.push(newDevice);
        }

        saveData().then(function() {
            if (!firebaseReady) {
                updateFilterOptions();
                render();
            }
            updateLastUpdateTime();
        });
        
        modal.classList.remove('active');
        resetForm();
        editingId = null;
    });

    locationFilter.addEventListener('change', function(e) {
        currentFilter = e.target.value;
        render();
    });

    sortAsc.addEventListener('click', function() {
        currentSort = 'asc';
        sortAsc.classList.add('active');
        sortDesc.classList.remove('active');
        render();
    });

    sortDesc.addEventListener('click', function() {
        currentSort = 'desc';
        sortDesc.classList.add('active');
        sortAsc.classList.remove('active');
        render();
    });

    searchInput.addEventListener('input', function(e) {
        searchTerm = e.target.value;
        render();
    });

    exportBtn.addEventListener('click', function() {
        var data = devices.map(function(d) {
            return {
                'Asset': d.asset,
                'Nazwa': d.name,
                'S/N': d.sn,
                'Lokalizacja': d.loc,
                'Data': d.capDate,
                'Osoba': d.picName,
                'Uwagi': d.notes,
                'Stan': d.inStock ? 'tak' : 'nie'
            };
        });

        var wb = XLSX.utils.book_new();
        var ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'sprzęt');
        XLSX.writeFile(wb, 'asset.xlsx');
    });

    importBtn.addEventListener('click', function() { importFile.click(); });

    importFile.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(ev) {
            try {
                var data = new Uint8Array(ev.target.result);
                var wb = XLSX.read(data, { type: 'array' });
                var sheet = wb.Sheets[wb.SheetNames[0]];
                var rows = XLSX.utils.sheet_to_json(sheet);

                var imported = rows.map(function(r, i) {
                    return {
                        id: Date.now() + '-' + i + '-' + Math.random().toString(36).substr(2, 6),
                        asset: (r['Asset'] && r['Asset'].toString()) || ('import-' + i),
                        name: (r['Nazwa'] && r['Nazwa'].toString()) || '—',
                        sn: (r['S/N'] && r['S/N'].toString()) || '—',
                        loc: (r['Lokalizacja'] && r['Lokalizacja'].toString()) || '—',
                        capDate: (r['Data'] && r['Data'].toString()) || '',
                        picName: (r['Osoba'] && r['Osoba'].toString()) || '',
                        notes: (r['Uwagi'] && r['Uwagi'].toString()) || '',
                        previewImg: '',
                        stickerImg: '',
                        inStock: r['Stan'] === 'tak'
                    };
                });

                devices = devices.concat(imported);
                saveData().then(function() {
                    updateFilterOptions();
                    render();
                    updateLastUpdateTime();
                    alert('import OK: ' + imported.length);
                });
            } catch (err) {
                alert('błąd importu');
            }
        };
        reader.readAsArrayBuffer(file);
        importFile.value = '';
    });

    function init() {
        container.innerHTML = '<div style="text-align:center;padding:20px;"><div class="loading-spinner"></div></div>';
        
        if (firebaseReady) {
            startFirebaseListener();
        } else {
            devices = loadFromStorage();
            updateFilterOptions();
            render();
            updateLastUpdateTime();
        }
    }

    init();
})();
</script>
</body>
</html>
